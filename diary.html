<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دفترچه خاطرات جادویی من 🦄</title>
    
    <!-- لینک CSS بوت‌استرپ ۵ راست‌چین -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">

    <style>
        /* تعریف فونت ایران‌سنس */
        @font-face {
            font-family: 'IRANSans';
            src: url('IRANSans.woff2') format('woff2'),
                 url('IRANSans.woff') format('woff');
            font-weight: normal;
            font-style: normal;
        }

        /* اعمال فونت ایران‌سنس به کل عناصر سایت */
        body, input, textarea, button, select, option {
            font-family: 'IRANSans', Tahoma, sans-serif !important;
            color: #4a4a4a;
        }

        body {
            background: linear-gradient(135deg, #ffe5ec 0%, #f0e6ff 100%);
            min-height: 100vh;
        }

        .pastel-card {
            background-color: rgba(255, 255, 255, 0.92);
            border: 3px solid #ffb3c6;
            border-radius: 25px;
            box-shadow: 0 10px 25px rgba(255, 179, 198, 0.35);
            backdrop-filter: blur(5px);
        }

        /* استایل دکمه صورتی و حفظ رنگ آن در حالت دیسیبل شده */
        .pastel-btn-pink {
            background-color: #ffb3c6 !important;
            color: #fff !important;
            border: none;
            border-radius: 20px;
            padding: 12px 25px;
            font-weight: bold;
            transition: all 0.3s;
            opacity: 1 !important; /* جلوگیری از کمرنگ شدن گوگل یا بوت‌استرپ */
        }

        .pastel-btn-pink:hover:not(:disabled) {
            background-color: #ff85a1 !important;
            color: #fff !important;
            transform: scale(1.03);
        }

        /* استایل دکمه در حالت دیسیبل برای جلوگیری از سفید شدن بک‌گراند */
        .pastel-btn-pink:disabled {
            background-color: #ffb3c6 !important;
            color: #fff !important;
            cursor: not-allowed;
        }

        .pastel-btn-purple {
            background-color: #c8b6ff;
            color: #fff;
            border: none;
            border-radius: 20px;
            padding: 12px 25px;
            font-weight: bold;
            transition: all 0.3s;
        }

        .pastel-btn-purple:hover:not(:disabled) {
            background-color: #b8c0ff;
            color: #fff;
            transform: scale(1.03);
        }

        .form-control {
            border: 2px solid #e2ece9;
            border-radius: 15px;
            padding: 12px;
        }

        .form-control:focus {
            border-color: #ffb3c6;
            box-shadow: 0 0 0 0.25rem rgba(255, 179, 198, 0.25);
        }

        .fade-in {
            animation: fadeIn 0.6s ease-in-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .diary-item {
            background-color: #fffdf0;
            border-right: 5px solid #ffd166;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
        }

        /* استایل اختصاصی دکمه‌های صفحه‌بندی پاستلی */
        .page-link {
            color: #6c5ce7;
            border: none;
            background: transparent;
            margin: 0 5px;
            border-radius: 10px !important;
        }
        .page-item.active .page-link {
            background-color: #c8b6ff !important;
            border-color: #c8b6ff !important;
            color: white !important;
        }
    </style>
</head>
<body>

    <div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh; padding: 20px 0;">
        
        <!-- ================= بخش اول: صفحه قفل و ورود رمز ================= -->
        <div id="lock-screen" class="card pastel-card p-4 text-center fade-in" style="max-width: 400px; width: 100%;">
            <div class="fs-1 mb-2">🦄✨</div>
            <h3 class="mb-4" style="color: #6c5ce7; font-weight: bold;">دفترچه خاطرات جادویی</h3>
            <p class="text-muted small mb-4">برای باز کردن دفترچه، رمز جادویی رو وارد کن!</p>
            
            <div class="mb-3">
                <input type="password" id="password-input" class="form-control text-center fs-4" placeholder="••••" maxlength="10">
                <div id="error-msg" class="text-danger small mt-2 d-none">ای وای! رمز اشتباه بود، دوباره تلاش کن 🧚‍♀️</div>
            </div>
            
            <button onclick="checkPassword()" id="login-btn" class="btn pastel-btn-pink w-100 mt-2">باز کردن با جادو 🔑</button>
        </div>

        <!-- ================= بخش دوم: محتوای اصلی دفترچه خاطرات ================= -->
        <div id="main-content" class="card pastel-card p-4 fade-in d-none" style="max-width: 650px; width: 100%;">
            <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-3">
                <h4 class="m-0" style="color: #ff758f; font-weight: bold;">دفترچه من 📝🌸</h4>
                <button onclick="lockDiary()" class="btn btn-sm btn-outline-secondary" style="border-radius: 15px;">قفل کردن 🔒</button>
            </div>

            <!-- فرم نوشتن خاطره جدید -->
            <div class="mb-4">
                <label class="form-label fw-bold">امروز چه اتفاقی افتاد؟ برام بنویس:</label>
                <textarea id="diary-text" class="form-control mb-3" rows="4" placeholder="امروز روز خیلی قشنگی بود چون..."></textarea>
                
                <div class="mb-3">
                    <label class="form-label d-block small text-muted">حس و حالت امروز چطوره؟</label>
                    <select id="diary-mood" class="form-select" style="border-radius: 15px; border: 2px solid #e2ece9;">
                        <option value="😊 عالی و خوشحال">😊 عالی و خوشحال</option>
                        <option value="🥳 پرانرژی و هیجان‌زده">🥳 پرانرژی و هیجان‌زده</option>
                        <option value="😴 یکم خسته">😴 یکم خسته</option>
                        <option value="😢 یکم ناراحت">😢 یکم ناراحت</option>
                    </select>
                </div>

                <button onclick="saveMemory()" id="submit-btn" class="btn pastel-btn-purple w-100">ثبت در حافظه دفترچه ✨</button>
            </div>

            <!-- لیست خاطرات لود شده از گوگل شیت -->
            <h5 class="mt-4 mb-3" style="color: #6c5ce7; font-weight: bold;">صندوقچه خاطرات من:</h5>
            
            <div id="memories-container" style="min-height: 100px;">
                <!-- آرایه خاطرات شیت این‌جا لود می‌شود -->
            </div>

            <!-- بخش دکمه‌های صفحه‌بندی (Pagination) ۵ تایی -->
            <nav class="mt-4">
                <ul class="pagination justify-content-center" id="pagination-controls">
                    <!-- دکمه‌ها خودکار اضافه می‌شوند -->
                </ul>
            </nav>
        </div>

    </div>

    <script>
        // لینک جدید و اختصاصی وب‌اپ گوگل شیت شما
        const GOOGLE_SHEET_URL = "https://script.google.com/macros/s/AKfycby1vjaWqPCwBuyWvqw_N9QH4Y_9SWmxQ4L-jb9SoRdYoqGvZPjDdcy1sJr9C-ikT1Yf/exec"; 
        
        let userPasswordToken = ""; 
        let allMemories = []; 
        let currentPage = 1;
        const itemsPerPage = 5; 

        // تایید رمز عبور با افکت لودینگ سفید رنگ روی بک‌گراند ثابت صورتی
        function checkPassword() {
            const passwordInput = document.getElementById('password-input').value;
            const errorMsg = document.getElementById('error-msg');
            const loginBtn = document.getElementById('login-btn');

            if (!passwordInput) return;

            // قفل کردن دکمه و تزریق اسپینر با رنگ سفید برای همخوانی با دکمه صورتی
            loginBtn.disabled = true;
            loginBtn.innerHTML = `
                <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true" style="color: #ffffff;"></span>
                در حال بررسی جادو... 
            `;

            const formData = new FormData();
            formData.append("action", "check_password");
            formData.append("password", passwordInput);

            fetch(GOOGLE_SHEET_URL, {
                method: 'POST',
                body: formData
            })
            .then(res => res.json())
            .then(data => {
                if (data.status === "success") {
                    userPasswordToken = passwordInput; 
                    errorMsg.classList.add('d-none');
                    document.getElementById('lock-screen').classList.add('d-none');
                    document.getElementById('main-content').classList.remove('d-none');
                    
                    fetchSavedMemories();
                } else {
                    errorMsg.classList.remove('d-none');
                    loginBtn.innerHTML = "باز کردن با جادو 🔑";
                    loginBtn.disabled = false;
                }
            })
            .catch(err => {
                console.error(err);
                alert("مشکل شبکه رخ داد. لطفاً چند لحظه دیگر امتحان کنید.");
                loginBtn.innerHTML = "باز کردن با جادو 🔑";
                loginBtn.disabled = false;
            });
        }

        // خواندن خاطرات از گوگل شیت
        function fetchSavedMemories() {
            const container = document.getElementById('memories-container');
            container.innerHTML = '<p class="text-muted text-center small my-4 fade-in">در حال باز کردن قفل صندوقچه و خواندن خاطرات... 🌸</p>';

            const formData = new FormData();
            formData.append("action", "get_memories");
            formData.append("password", userPasswordToken);

            fetch(GOOGLE_SHEET_URL, {
                method: 'POST',
                body: formData
            })
            .then(res => res.json())
            .then(resData => {
                if (resData.status === "success") {
                    allMemories = resData.data || [];
                    currentPage = 1; 
                    renderMemories();
                }
            })
            .catch(err => {
                console.error(err);
                container.innerHTML = '<p class="text-danger text-center small my-4">خطا در خواندن خاطرات قبلی! 😢</p>';
            });
        }

        // رندر کردن خاطرات به صورت ۵ تایی
        function renderMemories() {
            const container = document.getElementById('memories-container');
            container.innerHTML = "";

            if (allMemories.length === 0) {
                container.innerHTML = '<p id="no-memory-text" class="text-muted text-center small my-4">هنوز هیچ خاطره‌ای ننوشتی! اولین خاطره‌ات رو بالا یادداشت کن. ⭐️</p>';
                document.getElementById('pagination-controls').innerHTML = "";
                return;
            }

            const startIndex = (currentPage - 1) * itemsPerPage;
            const endIndex = startIndex + itemsPerPage;
            const paginatedItems = allMemories.slice(startIndex, endIndex);

            paginatedItems.forEach(item => {
                const memoryDiv = document.createElement('div');
                memoryDiv.className = 'diary-item fade-in';
                memoryDiv.innerHTML = `
                    <div class="d-flex justify-content-between small text-muted mb-2">
                        <span>📅 ${item.date}</span>
                        <span>حس و حال: ${item.mood}</span>
                    </div>
                    <p class="m-0 text-dark" style="white-space: pre-wrap;">${item.text}</p>
                `;
                container.appendChild(memoryDiv);
            });

            renderPaginationControls();
        }

        // ایجاد کنترلرهای صفحه‌بندی
        function renderPaginationControls() {
            const controlsContainer = document.getElementById('pagination-controls');
            controlsContainer.innerHTML = "";

            const totalPages = Math.ceil(allMemories.length / itemsPerPage);
            if (totalPages <= 1) return; 

            // دکمه قبلی
            const prevLi = document.createElement('li');
            prevLi.className = `page-item ${currentPage === 1 ? 'disabled' : ''}`;
            prevLi.innerHTML = `<button class="page-link" onclick="changePage(${currentPage - 1})">قبلی</button>`;
            controlsContainer.appendChild(prevLi);

            // شماره صفحات
            for (let i = 1; i <= totalPages; i++) {
                const pageLi = document.createElement('li');
                pageLi.className = `page-item ${currentPage === i ? 'active' : ''}`;
                pageLi.innerHTML = `<button class="page-link" onclick="changePage(${i})">${i}</button>`;
                controlsContainer.appendChild(pageLi);
            }

            // دکمه بعدی
            const nextLi = document.createElement('li');
            nextLi.className = `page-item ${currentPage === totalPages ? 'disabled' : ''}`;
            nextLi.innerHTML = `<button class="page-link" onclick="changePage(${currentPage + 1})">بعدی</button>`;
            controlsContainer.appendChild(nextLi);
        }

        function changePage(page) {
            currentPage = page;
            renderMemories();
        }

        // قفل کردن مجدد و ریست کردن دکمه ورود به حالت اول
        function lockDiary() {
            userPasswordToken = "";
            allMemories = [];
            document.getElementById('password-input').value = '';
            document.getElementById('main-content').classList.add('d-none');
            document.getElementById('lock-screen').classList.remove('d-none');
            
            const loginBtn = document.getElementById('login-btn');
            loginBtn.innerHTML = "باز کردن با جادو 🔑";
            loginBtn.disabled = false;
        }

        // ارسال خاطره به بک‌اند
        function saveMemory() {
            const textInput = document.getElementById('diary-text');
            const moodInput = document.getElementById('diary-mood');
            const submitBtn = document.getElementById('submit-btn');

            if (textInput.value.trim() === "") {
                alert("لطفاً ابتدا خاطره‌ت رو بنویس! 💕");
                return;
            }

            const today = new Date().toLocaleDateString('fa-IR');
            const savedText = textInput.value; 

            submitBtn.innerText = "در حال فرستادن به صندوقچه جادویی... ✨";
            submitBtn.disabled = true;

            const formData = new FormData();
            formData.append("action", "save_memory");
            formData.append("password", userPasswordToken);
            formData.append("date", today);
            formData.append("mood", moodInput.value);
            formData.append("text", savedText);

            const newLocalMemory = { date: today, mood: moodInput.value, text: savedText };

            fetch(GOOGLE_SHEET_URL, {
                method: 'POST',
                body: formData,
                mode: 'no-cors'
            })
            .then(() => {
                allMemories.unshift(newLocalMemory);
                currentPage = 1;
                renderMemories();
                textInput.value = "";
            })
            .catch(err => {
                console.error(err);
                alert("ثبت خاطره ناموفق بود. مجدداً تلاش کنید.");
            })
            .finally(() => {
                submitBtn.innerText = "ثبت در حافظه دفترچه ✨";
                submitBtn.disabled = false;
            });
        }
    </script>

    <!-- لینک جاوااسکریپت بوت‌استرپ ۵ -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
